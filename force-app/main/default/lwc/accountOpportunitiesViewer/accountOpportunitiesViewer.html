<template>
    <!-- Carte Salesforce avec titre et icône standard Opportunité -->
    <lightning-card title="Opportunités du Compte" icon-name="standard:opportunity">

        <!-- Conteneur responsive limité en largeur maximale -->
        <div class="slds-max-large-size_xx-large">

            <!-- Bouton déclenchant le rechargement manuel des opportunités -->
            <lightning-button class="slds-m-bottom_small"
                              label="Rafraîchir"
                              onclick={handleRafraichir}
                              variant="brand">
            </lightning-button>

            <!-- Tableau affiché uniquement si la liste d'opportunités est remplie -->
            <template if:true={opportunities}>
                <lightning-datatable data={opportunities}
                                     columns={columns}
                                     key-field="Id"
                                     class="slds-box slds-theme_default">
                </lightning-datatable>
            </template>

            <!-- Message affiché si aucune opportunité n'est liée au compte -->
            <template if:false={hasOpportunities}>
                <div class="slds-text-color_weak slds-m-top_medium">
                    Aucune opportunité trouvée pour ce compte.
                </div>
            </template>

            <!-- Bloc d'erreur affiché si le chargement Apex a échoué -->
            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error"
                     role="contentinfo">
                    <!-- Texte lisible uniquement par les lecteurs d'écran (accessibilité) -->
                    <span class="slds-assistive-text">Erreur</span>
                    <h2>Une erreur s'est produite lors du chargement des opportunités.</h2>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
