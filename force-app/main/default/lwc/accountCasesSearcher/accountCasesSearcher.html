<template>
    <!-- Carte Salesforce avec titre et icône standard Case -->
    <lightning-card title="Recherche de Cas par Sujet" icon-name="standard:case">

        <!-- Conteneur avec espacement interne sur tous les côtés -->
        <div class="slds-p-around_medium">

            <!-- Champ de saisie lié à searchTerm — se met à jour à chaque frappe via updateSearchTerm -->
            <lightning-input label="Rechercher par Sujet"
                             value={searchTerm}
                             onchange={updateSearchTerm}>
            </lightning-input>

            <!-- Bouton déclenchant la recherche Apex avec le terme saisi -->
            <lightning-button label="Rechercher"
                              variant="brand"
                              onclick={handleSearch}
                              class="slds-m-top_small">
            </lightning-button>

        </div>

        <!-- Tableau affiché uniquement si des cases ont été retournés par Apex -->
        <template if:true={cases}>
            <lightning-datatable data={cases}
                                 columns={columns}
                                 key-field="Id">
            </lightning-datatable>
        </template>

        <!-- Message d'erreur affiché si la recherche a échoué ou retourne aucun résultat -->
        <template if:true={error}>
            <p class="slds-p-around_medium slds-text-color_error">{error}</p>
        </template>

    </lightning-card>
</template>
